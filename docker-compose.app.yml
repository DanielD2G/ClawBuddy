services:
  api:
    image: ghcr.io/danield2g/clawbuddy:latest
    ports:
      - "4321:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://clawbuddy:clawbuddy@postgres:5432/clawbuddy
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      BROWSER_GRID_URL: http://browsergrid:9090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - shared
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:4000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      replicas: 1
      labels:
        com.clawbuddy.managed: "true"
        com.clawbuddy.service-role: "app"
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
      placement:
        constraints:
          - node.role == manager

networks:
  shared:
    external: true
    name: clawbuddy_shared
