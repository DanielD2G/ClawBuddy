name: Build & Push

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/danield2g/clawbuddy
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            CLAWBUDDY_VERSION=${{ github.ref_name }}
            CLAWBUDDY_COMMIT_SHA=${{ github.sha }}
            CLAWBUDDY_BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          fi
          {
            echo 'body<<EOF'
            echo "## Docker Images"
            echo ""
            echo '```'
            echo "docker pull ghcr.io/danield2g/clawbuddy:${{ needs.build.outputs.version }}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            echo "$COMMITS" | while read -r line; do echo "- $line"; done
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Generate release manifest
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          IMAGE_TAG="${VERSION#v}"
          cat > clawbuddy-release-manifest.json <<EOF
          {
            "version": "${VERSION}",
            "appImage": "ghcr.io/danield2g/clawbuddy:${IMAGE_TAG}",
            "imageDigest": null,
            "migration": {
              "mode": "none",
              "rollbackSafe": true
            },
            "deliveryMode": "integrated",
            "minUpdaterVersion": null,
            "notesUrl": "https://github.com/${{ github.repository }}/releases/tag/${VERSION}"
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false
          files: clawbuddy-release-manifest.json
