services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: clawbuddy
      POSTGRES_PASSWORD: clawbuddy
      POSTGRES_DB: clawbuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      shared:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawbuddy"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      shared:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      shared:
        aliases:
          - qdrant
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: clawbuddy
      MINIO_ROOT_PASSWORD: clawbuddy123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      shared:
        aliases:
          - minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1

  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 clawbuddy clawbuddy123 &&
      mc mb local/clawbuddy --ignore-existing
      "
    networks:
      - shared
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 5
        delay: 10s

  browsergrid:
    image: ghcr.io/danield2g/browsergrid-standalone:latest
    ports:
      - "9090:9090"
    environment:
      MAX_WORKERS: 5
      IDLE_TIMEOUT: 300
    tmpfs:
      - /dev/shm:size=2g
    networks:
      shared:
        aliases:
          - browsergrid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1

networks:
  shared:
    name: clawbuddy_shared
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    name: clawbuddy_postgres_data
  redis_data:
    name: clawbuddy_redis_data
  qdrant_data:
    name: clawbuddy_qdrant_data
  minio_data:
    name: clawbuddy_minio_data
